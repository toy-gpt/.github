# ============================================================
# .github/dependabot.yml (Check for GitHub Actions updates)
# ============================================================
# WHY: GitHub Actions are executable dependencies; auto-update for security patches.
# OBS: Python packages are upgraded manually, not here.
# OBS: Training repos use thin callers with no
#      pinned versions of their own.
#      This file is the single org update point.

version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"  # ALT: "weekly" for higher security posture
    commit-message:
      prefix: "(deps)"  # WHY: Filterable in commit history

# ============================================================
# .github/workflows/links.yml (Lychee Link Checker)
# ============================================================
# WHY-FILE: Automated link checking.
# OBS: Behavior is configured in lychee.toml in this repository.
# OBS: Runs monthly on schedule; manual trigger always available.
# OBS: Not run on pull requests (mostly dependabot; link checks add noise).

name: Check Links

on:
  workflow_dispatch:  # WHY: Manual trigger - always available.
  workflow_call:      # WHY: Allow calling from other repos in this org.
                      # OBS: schedule trigger only fires from toy-gpt/.github, not callers.
  schedule:
    - cron: "0 6 1 * *"  # WHY: Runs monthly (1st of month).

concurrency:
  # WHY: Prevent multiple simultaneous link checks on same ref.
  # OBS: github.ref may be undefined for workflow_call; concurrency group falls back gracefully.
  group: link-check-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read  # WHY: Needed to checkout code.
  issues: write   # WHY: Needed to create issue on scheduled failures.

env:
  REPORT_FAILURES: "true"         # WHY: Enable scheduled issues for link failures.
  REPORT_PATH: "./lychee-report.md"  # WHY: Single source of truth for report location.

jobs:
  lychee:
    name: Link checks
    runs-on: ubuntu-latest  # WHY: Linux environment matches most production deployments.
    timeout-minutes: 20     # WHY: Prevent hanging jobs. If over time, likely stuck.

    steps:
      - name: 1) Checkout repository code
        uses: actions/checkout@v6

      - name: 2) Check links with Lychee
        id: lychee
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          # WHY: Do not hard-fail inside the action; decide final status in the gate step.
          fail: false
          # WHY: Capture output for use in job summary and scheduled issue.
          output: ./lychee-report.md
          # OBS: Force markdown so the report is readable in summaries.
          format: markdown
          # WHY: Publish Lychee's markdown report to the GitHub Actions Summary tab.
          jobSummary: true
          args: >
            --config lychee.toml
            --user-agent "${{ github.repository }}/lychee"
            './**/*.bib'
            './**/*.md'
            './**/*.html'
            './**/*.tex'
            './**/*.yml'
            './**/*.yaml'
          # OBS: Always use latest Lychee release.
          lycheeVersion: latest
        env:
          # WHY: Allows Lychee to authenticate to GitHub when checking links.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3) Add results to job summary
        if: always()
        run: |
          {
            echo "## Link Check Report"
            echo ""

            if [ -s "${REPORT_PATH}" ]; then
              cat "${REPORT_PATH}"
            else
              cat << 'EOF'
          # Summary

          | Status        | Count |
          |---------------|-------|
          | 🔍 Total      | 0     |
          | ✅ Successful | 0     |
          | ⏳ Timeouts   | 0     |
          | 🔀 Redirected | 0     |
          | 👻 Excluded   | 0     |
          | ❓ Unknown    | 0     |
          | 🚫 Errors     | 0     |
          | ⛔ Unsupported| 0     |

          No report was generated. The workflow is treating this as a failure so the status does not go green silently.
          EOF
            fi

            # WHY: Provide a fix-it hint when the Dependabot security page is flagged.
            if [ -f "${REPORT_PATH}" ] && grep -q "/security/dependabot" "${REPORT_PATH}"; then
              cat << 'EOF'

          ## Fix for Dependabot security link (GitHub settings)
          If the link checker reports a 404 for the Dependabot security page, it is often because Advanced Security options are not enabled.

          Please go to:
          Repository Settings -> Advanced Security

          Enable at least:
          - Dependabot security updates
          - Grouped security updates (recommended)

          After enabling, the Dependabot security page link should resolve.
          EOF
            fi

            echo ""
            echo "## Run Metadata"
            echo ""
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Lychee exit code: \`${{ steps.lychee.outputs.exit_code }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 4) Create issue for scheduled failures
        # WHY: Track broken links found during scheduled checks.
        # OBS: Only creates issue if none already open with 'broken-links' label.
        if: steps.lychee.outputs.exit_code != 0 && github.event_name == 'schedule' && env.REPORT_FAILURES == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const date = new Date().toISOString().split("T")[0];
            const title = `Link Check Failed - ${date}`;
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;

            let report = "Lychee report file was not found.";
            try {
              report = fs.readFileSync("./lychee-report.md", "utf8");
            } catch (error) {
              // Keep fallback text above.
            }

            const body = [
              "Monthly link check found broken links.",
              "",
              `Workflow run: ${runUrl}`,
              "",
              "Report:",
              "",
              report,
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              labels: "broken-links",
              state: "open",
              per_page: 1,
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["maintenance", "broken-links"],
              });
            }

      - name: 5) Gate fail job if broken links found
        # WHY: Ensure the overall status is not green when broken links are detected.
        if: always()
        run: |
          code="${{ steps.lychee.outputs.exit_code }}"

          if [ -z "$code" ]; then
            echo "::error::Lychee exit code missing (treating as failure so status is not green)."
            exit 1
          fi

          if [ "$code" != "0" ]; then
            echo "::error::Broken links detected (lychee exit code $code). See the job summary report."
            exit 1
          fi

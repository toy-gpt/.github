# ============================================================
# .github/workflows/release-pypi-shared.yml
# (Release PyPI + docs via Zensical — shared org workflow)
# ============================================================
# WHY-FILE: Publish a tagged release to PyPI and deploy docs to GitHub Pages.
# REQ: Trigger ONLY on version tags like v1.2.3.
# REQ: PyPI project must be configured for Trusted Publishing (OIDC).
# REQ: uv build must run before anything that modifies the working tree (including uv sync).
# REQ: Repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions
# OBS: Called by thin callers in each PyPI repo via workflow_call.

name: Release (PyPI + Zensical docs)

on:
  workflow_call: # WHY: Allow calling from PyPI repos in this org.

permissions: # WHY: Use least privileges required.
  contents: write   # WHY: Create GitHub Release.
  pages: write      # WHY: Required to deploy to GitHub Pages.
  id-token: write   # WHY: PyPI Trusted Publishing (OIDC) + deploy-pages OIDC.

env:
  PYTHONUNBUFFERED: "1"       # WHY: Real-time logging.
  PYTHONIOENCODING: "utf-8"   # WHY: Ensure UTF-8 encoding for international characters.

concurrency:
  # WHY: Prevent concurrent releases; wait for previous to complete.
  group: release-${{ github.ref }}
  cancel-in-progress: false  # WHY: Never cancel a release in progress.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # WHY: Prevent hanging jobs. If over, it is likely stuck.
    environment: pypi  # WHY: Use 'pypi' environment for PyPI publishing; ignore warnings.
    env:
      UV_PYTHON: "3.14" # WHY: Set Python version for all steps.

    steps:

      # === ASSEMBLE ===

      - name: A1) Checkout repository with full history and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # WHY: hatch-vcs needs full history to derive version from tags.
          fetch-tags: true
          ref: ${{ github.ref }}

      - name: A2) Configure GitHub Pages
        # WHY: Sets Pages metadata for deployments.
        uses: actions/configure-pages@v6

      - name: A3) Install uv (with caching and uv.lock awareness)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: A4) Install Python 3.14
        run: uv python install 3.14

      - name: A5) Display versions
        run: |
          uv --version
          uv run python --version

      # === BASELINE CHECKS (build while git is pristine) ===

      - name: B1) Extract plain version from tag (no leading 'v')
        id: ver
        shell: bash
        run: echo "plain=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: B2) Verify git is clean before build
        run: |
          echo "Git status:"
          git status --short
          echo "Git describe:"
          git describe --tags --always --dirty
          if [[ $(git status --porcelain) ]]; then
            echo "ERROR: Git tree is dirty before build!"
            exit 1
          fi

      - name: B3) Build sdist + wheel
        # WHY: hatch-vcs derives version from git tag; build before uv sync
        # to avoid working tree changes invalidating the clean check.
        run: uv build

      - name: B4) Ensure built artifact version matches tag
        shell: bash
        run: |
          set -e
          TAG="${{ steps.ver.outputs.plain }}"
          echo "Tag version: $TAG"
          ls dist
          if ! ls dist/*"$TAG"*.whl dist/*"$TAG"*.tar.gz >/dev/null 2>&1; then
            echo "ERROR: Built artifact version does not match tag $TAG"
            exit 1
          fi
          echo "Artifact version matches tag."

      # === CHECKS (after build, may modify working tree) ===

      - name: C1) Sync to install all dependencies
        run: uv sync --extra dev --extra docs --upgrade

      - name: C2) Ruff format (check only)
        run: uv run ruff format --check .

      - name: C3) Ruff lint (no fixes)
        run: uv run ruff check .

      - name: C4) Validate pyproject.toml
        run: uvx validate-pyproject

      - name: C5) Pyright (type check)
        run: uv run pyright

      - name: C6) Deptry (dependency check)
        run: uvx deptry .

      - name: C7) Validate built artifacts
        run: uv run twine check dist/*

      # === DEPLOY RELEASE AND DOCS ===

      - name: D1) Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
          make_latest: true

      - name: D2) Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: D3) Build docs with Zensical
        run: |
          if [ ! -f "zensical.toml" ]; then
            echo "zensical.toml not found; skipping docs deploy." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          uv run zensical build

      - name: D4) Verify site output exists
        run: |
          if [ ! -d "site" ]; then
            echo "## Documentation build output missing" >> "$GITHUB_STEP_SUMMARY"
            echo "Expected directory 'site/' was not created." >> "$GITHUB_STEP_SUMMARY"
            echo "Check the Zensical build step and zensical.toml configuration." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: D5) Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: D6) Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
